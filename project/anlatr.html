**VLAN tam burada devreye girer.**

VLAN (Virtual Local Area Network), tek bir fiziksel ağı birden fazla mantıksal ağa böler. Aynı switch'e bağlı cihazlar farklı VLAN'lara atanabilir ve birbirlerine erişemezler.

**Nasıl çalışır?**

Her ağ paketine bir VLAN etiketi (tag) eklenir. Switch bu etikete bakarak paketi doğru gruba yönlendirir.

**Ne işe yarar?**

- Güvenlik: Muhasebe verileri yazılım ekibinden izole edilir
- Performans: Broadcast trafiği sadece ilgili VLAN içinde kalır
- Yönetilebilirlik: Fiziksel kablo değişikliği olmadan ağ yeniden düzenlenir`},

function formatBody(text){
  return text.split('\n\n').map((para,i)=>{
    if(para.startsWith('- ')){
      const items=para.split('\n').filter(l=>l.startsWith('- ')).map(l=>l.slice(2));
      return <ul key={i} style={{paddingLeft:'1.3rem',margin:'0 0 1.25rem'}}>{items.map((it,j)=><li key={j} style={{marginBottom:'0.35rem'}} dangerouslySetInnerHTML={{__html:it.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')}}></li>)}</ul>;
    }
    const html=para.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/`(.*?)`/g,'<code>$1</code>');
    return <p key={i} style={{marginBottom:'1.25rem'}} dangerouslySetInnerHTML={{__html:html}}></p>;
  });
}
function hl(text,q){
  if(!q?.trim()) return text;
  const esc=q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
  const parts=text.split(new RegExp(`(${esc})`,'gi'));
  return parts.map((p,i)=>p.toLowerCase()===q.toLowerCase()?<mark key={i} style={{background:'#ccfbf1',color:'var(--teal)',padding:'0 1px',borderRadius:'2px'}}>{p}</mark>:p);
}

      <div style={{maxWidth:'1240px',margin:'0 auto',display:'flex',alignItems:'center',gap:'3rem',flexWrap:'wrap'}}>
        <div style={{flex:1,minWidth:'200px'}}>
          <p style={{fontSize:'0.65rem',fontWeight:700,letterSpacing:'0.12em',textTransform:'uppercase',color:'var(--teal)',marginBottom:'0.5rem'}}>Bülten</p>
          <h3 className="fr" style={{fontSize:'1.5rem',fontWeight:300,letterSpacing:'-0.03em',color:'white',marginBottom:'0.35rem'}}>Zihninizi Güncel Tutun.</h3>
          <p style={{fontSize:'0.8rem',color:'rgba(255,255,255,0.3)'}}>Her hafta yeni bir konu. Sade, gereksiz detaysız.</p>
        </div>
        <div style={{flex:1,minWidth:'280px'}}>
          {!done?(
            <div style={{display:'flex',gap:'0.5rem'}}>
              <input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="E-posta adresiniz"
                style={{flex:1,padding:'0.65rem 0.9rem',border:'1px solid rgba(255,255,255,0.1)',borderRadius:'7px',fontSize:'0.83rem',fontFamily:'inherit',background:'rgba(255,255,255,0.06)',color:'white',transition:'border-color .15s'}}
                onFocus={e=>e.target.style.borderColor='rgba(13,148,136,0.4)'}
                onBlur={e=>e.target.style.borderColor='rgba(255,255,255,0.1)'}
                onKeyDown={e=>e.key==='Enter'&&email.includes('@')&&setDone(true)}
              />
              <button onClick={()=>{if(email.includes('@'))setDone(true);}} style={{background:'var(--teal)',color:'white',border:'none',padding:'0.65rem 1.15rem',borderRadius:'7px',fontSize:'0.82rem',fontWeight:700,cursor:'pointer',fontFamily:'inherit',whiteSpace:'nowrap',transition:'background .15s'}}
                onMouseEnter={e=>e.currentTarget.style.background='var(--teal-d)'}
                onMouseLeave={e=>e.currentTarget.style.background='var(--teal)'}
              >ABONE OL</button>
            </div>
          ):(
            <div className="fi" style={{display:'inline-flex',alignItems:'center',gap:'0.5rem',padding:'0.65rem 1rem',background:'rgba(13,148,136,0.1)',border:'1px solid rgba(13,148,136,0.25)',borderRadius:'7px'}}>
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2.5 7l3.5 3.5L11.5 3" stroke="var(--teal)" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>
              <span style={{fontSize:'0.83rem',color:'var(--teal)'}}>Abone oldun, teşekkürler!</span>
            </div>

      </div>
    </div>
  );
};

const Footer = ({onNav}) => (
  <footer style={{background:'var(--ink)',borderTop:'1px solid rgba(255,255,255,0.05)',padding:'2.5rem 2rem 2rem'}}>
    <div style={{maxWidth:'1240px',margin:'0 auto'}}>
      <div style={{display:'grid',gridTemplateColumns:'2fr 1fr 1fr 1fr',gap:'2rem',marginBottom:'2rem'}}>
        <div>
          <span className="fr" style={{fontSize:'1rem',fontWeight:600,letterSpacing:'-0.04em',color:'white'}}>ANLA<span style={{color:'var(--teal)'}}>.</span>TR</span>

        </div>
        {[{t:'YAYIN',l:['Bu Hafta','Arşiv','Kategoriler','Bülten']},{t:'YASAL',l:['Gizlilik Politikası','Kullanım Şartları']},{t:'BAĞLANTI',l:['İletişim','Twitter/X','RSS']}].map(col=>(
          <div key={col.t}>
            <p style={{fontSize:'0.6rem',fontWeight:700,letterSpacing:'0.11em',color:'rgba(255,255,255,0.2)',marginBottom:'0.75rem'}}>{col.t}</p>
            {col.l.map(l=><button key={l} style={{display:'block',background:'none',border:'none',cursor:'pointer',fontFamily:'inherit',fontSize:'0.78rem',color:'rgba(255,255,255,0.38)',padding:'0.2rem 0',transition:'color .12s'}} onMouseEnter={e=>e.currentTarget.style.color='white'} onMouseLeave={e=>e.currentTarget.style.color='rgba(255,255,255,0.38)'}>{l}</button>)}
          </div>
        ))}
      </div>
      <div style={{borderTop:'1px solid rgba(255,255,255,0.05)',paddingTop:'1.25rem',display:'flex',justifyContent:'space-between'}}>
        <span style={{fontSize:'0.7rem',color:'rgba(255,255,255,0.18)'}}>© 2025 anla.tr — Bütün hakları saklıdır.</span>
        <span style={{fontSize:'0.7rem',color:'rgba(255,255,255,0.18)'}}>Türkçe · Teknik · Ekonomi · Teknoloji</span>
      </div>

  </footer>
);

const MiniSub=()=>{
  const [e,setE]=useState('');
  const [done,setDone]=useState(false);
  if(done) return <p style={{fontSize:'0.8rem',color:'var(--teal)'}}>Abone oldun!</p>;
  return(
    <div style={{display:'flex',flexDirection:'column',gap:'0.45rem'}}>
      <input type="email" value={e} onChange={ev=>setE(ev.target.value)} placeholder="E-posta adresiniz"
        style={{width:'100%',padding:'0.5rem 0.75rem',border:'1px solid rgba(255,255,255,0.1)',borderRadius:'6px',fontSize:'0.78rem',fontFamily:'inherit',background:'rgba(255,255,255,0.06)',color:'white'}}
        onFocus={ev=>ev.target.style.borderColor='rgba(13,148,136,0.4)'}
        onBlur={ev=>ev.target.style.borderColor='rgba(255,255,255,0.1)'}
      />
      <button onClick={()=>{if(e.includes('@'))setDone(true);}} style={{width:'100%',background:'var(--teal)',color:'white',border:'none',padding:'0.5rem',borderRadius:'6px',fontSize:'0.78rem',fontWeight:700,cursor:'pointer',fontFamily:'inherit',transition:'background .15s'}}
        onMouseEnter={ev=>ev.currentTarget.style.background='var(--teal-d)'}
        onMouseLeave={ev=>ev.currentTarget.style.background='var(--teal)'}
      >Kayıt Ol</button>
    </div>
  );
};

function ContentPage({itemId,onNav}){
  const item=CONTENT.find(c=>c.id===itemId);
  useEffect(()=>{window.scrollTo(0,0);},[itemId]);
  if(!item) return null;
  const m=CAT[item.category]||{c:'var(--teal)',bg:'var(--teal-l)'};
  const Illu=ILLUS[item.id];
  const related=CONTENT.filter(c=>c.id!==itemId&&c.category===item.category).slice(0,4);
  return (
    <div style={{paddingTop:'52px',minHeight:'100vh',background:'var(--bg)'}}>
      <div style={{background:'white',borderBottom:'1px solid var(--border)',padding:'2rem 2rem 1.75rem'}}>
        <div style={{maxWidth:'1240px',margin:'0 auto',display:'grid',gridTemplateColumns:'1fr 320px',gap:'3rem',alignItems:'center'}}>
          <div>
            <div style={{display:'flex',alignItems:'center',gap:'0.6rem',marginBottom:'1rem'}}>
              <button onClick={()=>onNav('home')} style={{background:'none',border:'none',cursor:'pointer',display:'inline-flex',alignItems:'center',gap:'4px',fontSize:'0.78rem',fontWeight:500,color:'var(--muted)',padding:0,fontFamily:'inherit',transition:'color .12s'}}
                onMouseEnter={e=>e.currentTarget.style.color='var(--ink)'}
                onMouseLeave={e=>e.currentTarget.style.color='var(--muted)'}
              >
                <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M8 2L3 6l5 4" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round"/></svg>
                Tüm konular
              </button>
              <span style={{color:'var(--border)'}}>·</span>
              <Bdg label={item.category}/>
              <span style={{color:'var(--border)'}}>·</span>
              <span style={{fontSize:'0.72rem',color:'var(--muted)',display:'flex',alignItems:'center',gap:'3px'}}>
                <svg width="11" height="11" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="currentColor" strokeWidth="1.5"/><path d="M12 7v5l3 3" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"/></svg>
                {item.readMin} dakika okuma
              </span>
            </div>
            <h1 className="fr" style={{fontSize:'clamp(1.6rem,3vw,2.4rem)',fontWeight:300,letterSpacing:'-0.04em',lineHeight:1.1,color:'var(--ink)',marginBottom:'1rem'}}>{item.title}</h1>
            <div style={{borderLeft:`3px solid ${m.c}`,paddingLeft:'1rem'}}>
              <p className="fr" style={{fontSize:'1rem',fontWeight:300,fontStyle:'italic',color:'var(--muted)',lineHeight:1.6}}>{item.summary}</p>
            </div>
          </div>
          <div style={{height:'160px',borderRadius:'10px',overflow:'hidden',border:'1px solid var(--border)',background:'#0a0a12'}}>
            {Illu&&<Illu/>}
          </div>
        </div>
      </div>
      <div style={{maxWidth:'1240px',margin:'0 auto',padding:'2.5rem 2rem 4rem',display:'grid',gridTemplateColumns:'1fr 280px',gap:'3rem',alignItems:'start'}}>
        <div style={{background:'white',borderRadius:'12px',border:'1px solid var(--border)',padding:'2rem 2.25rem'}}>
          <div style={{fontSize:'0.95rem',lineHeight:1.85,color:'var(--ink)'}}>
            <style>{`.ab code{font-family:'Courier New',monospace;font-size:.875em;background:var(--bg);padding:2px 7px;border-radius:4px;color:var(--teal)}.ab strong{font-weight:600}`}</style>
            <div className="ab">{formatBody(item.body)}</div>
          </div>
          <div style={{marginTop:'2rem',paddingTop:'1.25rem',borderTop:'1px solid var(--border2)',display:'flex',gap:'0.5rem',flexWrap:'wrap',alignItems:'center'}}>
            <span style={{fontSize:'0.72rem',color:'var(--dim)',marginRight:'0.25rem'}}>Etiketler:</span>
            {item.tags.map(t=><span key={t} style={{fontSize:'0.72rem',color:'var(--muted)',border:'1px solid var(--border)',padding:'2px 8px',borderRadius:'20px'}}>#{t}</span>)}
          </div>
        </div>
        <div style={{position:'sticky',top:'72px',display:'flex',flexDirection:'column',gap:'1rem'}}>
          {related.length>0&&(
            <div style={{background:'white',border:'1px solid var(--border)',borderRadius:'10px',overflow:'hidden'}}>
              <div style={{padding:'0.75rem 1rem',borderBottom:'1px solid var(--border)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <p style={{fontSize:'0.62rem',fontWeight:700,letterSpacing:'0.09em',textTransform:'uppercase',color:'var(--muted)'}}>İlgili Konular</p>
                <span style={{fontSize:'0.68rem',color:'var(--dim)'}}>{item.category}</span>
              </div>
              {related.map((r,i)=>{
                const RI=ILLUS[r.id];
                return(
                  <button key={r.id} onClick={()=>onNav('content',r.id)}
                    style={{width:'100%',display:'flex',alignItems:'center',gap:'0.75rem',padding:'0.7rem 1rem',background:'none',border:'none',cursor:'pointer',fontFamily:'inherit',textAlign:'left',borderBottom:i<related.length-1?'1px solid var(--border2)':'none',transition:'background .12s'}}
                    onMouseEnter={e=>e.currentTarget.style.background='var(--bg)'}
                    onMouseLeave={e=>e.currentTarget.style.background='none'}
                  >
                    <div style={{width:'44px',height:'32px',borderRadius:'4px',overflow:'hidden',flexShrink:0,background:'#0a0a12'}}>{RI&&<RI/>}</div>
                    <div style={{flex:1}}>
                      <p style={{fontSize:'0.8rem',fontWeight:500,color:'var(--ink)',lineHeight:1.3}}>{r.title}</p>
                      <span style={{fontSize:'0.68rem',color:'var(--dim)'}}>{r.readMin} dk · {r.category}</span>
                    </div>
                  </button>
                );
              })}
            </div>
          )}
          <div style={{background:'var(--ink2)',borderRadius:'10px',padding:'1.1rem'}}>
            <p style={{fontSize:'0.62rem',fontWeight:700,letterSpacing:'0.1em',textTransform:'uppercase',color:'var(--teal)',marginBottom:'0.5rem'}}>Bülten</p>
            <p className="fr" style={{fontSize:'0.9rem',fontWeight:300,color:'white',lineHeight:1.35,marginBottom:'0.75rem'}}>Yeni konulardan haberdar ol</p>
            <MiniSub/>
          </div>
        </div>
      </div>
      <NewsletterBand/>
      <Footer onNav={onNav}/>
    </div>
  );
}

function SubscribePage({onNav}){
  const [email,setEmail]=useState('');
  const [done,setDone]=useState(false);
  return(
    <div style={{paddingTop:'52px',minHeight:'100vh',background:'var(--bg)',display:'flex',flexDirection:'column'}}>
      <div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',padding:'4rem 2rem'}}>
        <div style={{maxWidth:'420px',width:'100%',textAlign:'center'}}>
          {!done?(
            <>
              <div style={{width:'44px',height:'44px',borderRadius:'10px',background:'var(--teal)',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 1.5rem'}}>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" stroke="white" strokeWidth="1.5"/><path d="M22 6l-10 7L2 6" stroke="white" strokeWidth="1.5"/></svg>
              </div>
              <h1 className="fr" style={{fontSize:'1.85rem',fontWeight:300,letterSpacing:'-0.04em',color:'var(--ink)',marginBottom:'0.75rem'}}>Yeni konulardan haberdar ol</h1>
              <p style={{color:'var(--muted)',marginBottom:'1.75rem',fontSize:'0.875rem',lineHeight:1.65}}>Haftada bir, sade. Fazlası yok.</p>
              <div style={{display:'flex',gap:'0.5rem'}}>
                <input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="e-posta adresin"
                  style={{flex:1,padding:'0.65rem 0.9rem',border:'1.5px solid var(--border)',borderRadius:'8px',fontSize:'0.875rem',fontFamily:'inherit',color:'var(--ink)',background:'white',transition:'border-color .15s'}}
                  onFocus={e=>e.target.style.borderColor='var(--teal)'}
                  onBlur={e=>e.target.style.borderColor='var(--border)'}
                  onKeyDown={e=>e.key==='Enter'&&email.includes('@')&&setDone(true)}
                />
                <button onClick={()=>{if(email.includes('@'))setDone(true);}} style={{background:'var(--teal)',color:'white',border:'none',padding:'0.65rem 1.15rem',borderRadius:'8px',fontSize:'0.83rem',fontWeight:700,cursor:'pointer',fontFamily:'inherit',whiteSpace:'nowrap',transition:'background .15s'}}
                  onMouseEnter={e=>e.currentTarget.style.background='var(--teal-d)'}
                  onMouseLeave={e=>e.currentTarget.style.background='var(--teal)'}
                >Abone Ol</button>
              </div>
            </>
          ):(
            <div className="fu">
              <div style={{width:'44px',height:'44px',borderRadius:'50%',background:'var(--teal-l)',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 1.25rem'}}>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M5 12l5 5L20 7" stroke="var(--teal)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>
              </div>
              <h2 className="fr" style={{fontSize:'1.6rem',fontWeight:300,letterSpacing:'-0.04em',color:'var(--ink)',marginBottom:'0.5rem'}}>Teşekkürler!</h2>
              <p style={{color:'var(--muted)',marginBottom:'1.5rem',fontSize:'0.875rem'}}>{email}</p>
              <button onClick={()=>onNav('home')} style={{background:'none',border:'1.5px solid var(--border)',padding:'0.55rem 1.35rem',borderRadius:'7px',cursor:'pointer',fontFamily:'inherit',fontSize:'0.875rem',fontWeight:500,color:'var(--ink)',transition:'border-color .15s'}}
                onMouseEnter={e=>e.currentTarget.style.borderColor='var(--teal)'}
                onMouseLeave={e=>e.currentTarget.style.borderColor='var(--border)'}
              >Ana sayfaya dön</button>
            </div>
          )}
        </div>
      </div>
      <Footer onNav={onNav}/>
    </div>
  );
}

function App(){
  const [page,setPage]=useState('home');
  const [contentId,setContentId]=useState(null);
  const [homeCat,setHomeCat]=useState('Tümü');
  const [searchOpen,setSearchOpen]=useState(false);
  const onNav=useCallback((target,id,q,cat)=>{
    setPage(target);setContentId(id||null);
    if(cat!==undefined)setHomeCat(cat);
    setSearchOpen(false);window.scrollTo(0,0);
  },[]);
  useEffect(()=>{
    const fn=e=>{if((e.metaKey||e.ctrlKey)&&e.key==='k'){e.preventDefault();setSearchOpen(v=>!v);}if(e.key==='Escape')setSearchOpen(false);};
    window.addEventListener('keydown',fn);return()=>window.removeEventListener('keydown',fn);
  },[]);
  return(
    <>
      <Nav onNav={onNav} onSearch={()=>setSearchOpen(true)}/>
      {searchOpen&&<SearchOverlay onClose={()=>setSearchOpen(false)} onNav={onNav}/>}
      {page==='home'&&<HomePage initCat={homeCat} onNav={onNav}/>}
      {page==='content'&&contentId&&<ContentPage itemId={contentId} onNav={onNav}/>}
      {page==='subscribe'&&<SubscribePage onNav={onNav}/>}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
